<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>従業員管理台帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1a18;--text2:#6b6860;--text3:#9e9b93;
  --accent:#2d5a3d;--accent-light:#e8f0eb;--accent-text:#1e3d2a;
  --warn:#854f0b;--warn-light:#fdf3e7;
  --danger:#8b2020;--danger-light:#fdf0f0;
  --info:#1a4a7a;--info-light:#e8f0f8;
  --radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;width:100%;max-width:360px;text-align:center}
.login-box h1{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--accent)}
.login-box p{color:var(--text2);font-size:13px;margin-bottom:28px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;cursor:pointer;font-weight:500}
.login-box button:hover{background:var(--accent-text)}
.login-error{color:var(--danger);font-size:12px;margin-top:8px;display:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
header h1{font-size:15px;font-weight:700;color:var(--accent);flex:1;min-width:80px}
.nav-btn{padding:6px 11px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.nav-btn.active{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent)}
.nav-btn:hover:not(.active){background:var(--bg)}
main{padding:20px;max-width:1100px;width:100%;margin:0 auto}
.btn{padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-text)}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:#e8b8b8}
.btn-sm{padding:4px 10px;font-size:12px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px}
.scard-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.scard-val{font-size:24px;font-weight:700}
.search-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.search-bar input,.search-bar select{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.search-bar input{flex:1;min-width:160px}
.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500;white-space:nowrap;background:var(--bg)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.emp-name{font-weight:500;cursor:pointer;color:var(--accent);text-decoration:underline;text-underline-offset:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500}
.badge-active{background:#e2f4ea;color:#1a5c30}
.badge-retired{background:#f0efec;color:#5a5855}
.badge-visa{background:var(--info-light);color:var(--info)}
.badge-warn{background:var(--warn-light);color:var(--warn)}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid var(--border);background:var(--bg);color:var(--text2)}
.form-wrap{max-width:760px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}
.field-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--text2);font-weight:500}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
/* 部署インライン追加ボタン */
.dept-inline{display:flex;gap:6px;align-items:center}
.dept-inline select{flex:1}
.dept-add-btn{padding:7px 10px;border-radius:var(--radius);border:1px solid var(--accent);background:var(--accent-light);color:var(--accent-text);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.dept-add-btn:hover{background:var(--accent);color:#fff}
/* 設定ページ */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;max-width:600px}
.settings-card h3{font-size:15px;font-weight:700;margin-bottom:16px}
.dept-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;flex-wrap:wrap}
.dept-row .d1{font-weight:500;font-size:13px;flex:1;min-width:100px}
.dept-row .d2{font-size:13px;color:var(--text2);flex:1;min-width:100px}
.dept-edit-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:10px}
.dept-edit-form input{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text)}
.dept-edit-form input:focus{border-color:var(--accent)}
/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border2);width:100%;max-width:420px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-box h3{font-size:15px;font-weight:700;margin-bottom:16px}
.modal-box .field{margin-bottom:12px}
.modal-box .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.detail-header h2{font-size:18px;font-weight:700}
.tab-list{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.itab{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap}
.itab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.detail-field{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:11px;color:var(--text3);font-weight:500}
.detail-val{font-size:14px}
.list-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;flex-wrap:wrap}
.list-item .dt{color:var(--text2);font-size:12px;min-width:90px}
.add-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:10px;padding:14px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)}
.add-row input,.add-row select{padding:6px 9px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit}
.sel-group{display:flex;gap:6px;flex-wrap:wrap}
.sel-btn{padding:6px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;transition:.15s}
.sel-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.sel-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.yukyu-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;max-width:700px}
.yukyu-form .frow{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.yukyu-form .frow label{font-size:12px;color:var(--text2);font-weight:500}
.emp-search-wrap{position:relative}
.emp-search-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none}
.emp-search-input:focus{border-color:var(--accent)}
.emp-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none}
.emp-dropdown.show{display:block}
.emp-option{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
.emp-option:last-child{border-bottom:none}
.emp-option:hover{background:var(--accent-light)}
.emp-selected-box{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid var(--accent);border-radius:var(--radius);background:var(--accent-light)}
.photo-upload{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:16px;text-align:center;color:var(--text2);font-size:12px;cursor:pointer;background:var(--bg);transition:.15s}
.photo-upload.dragover{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text)}
.empty{text-align:center;color:var(--text3);padding:36px 0;font-size:13px}
.page-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;padding-bottom:100px}
.loading{text-align:center;color:var(--text3);padding:48px 0}

/* 固定戻るバー（上部） */
.sticky-back{position:sticky;top:52px;z-index:9;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;margin:-20px -20px 20px -20px;}
.sticky-back h2{font-size:15px;font-weight:700}

/* 固定フッターバー（下部） */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--surface);border-top:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;justify-content:flex-end;box-shadow:0 -2px 8px rgba(0,0,0,.06);}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>従業員管理台帳</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="pwInput" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginErr">パスワードが違います</div>
  </div>
</div>

<div id="appScreen" style="display:none;flex-direction:column;min-height:100vh">
  <header>
    <h1>従業員管理台帳</h1>
    <button class="nav-btn" id="tList" onclick="showView('list')">従業員一覧</button>
    <button class="nav-btn" id="tAdd" onclick="showView('add')">＋ 新規登録</button>
    <button class="nav-btn" id="tAlert" onclick="showView('alert')" style="color:var(--warn);border-color:var(--warn)">⚠ 警告一覧</button>
    <button class="nav-btn" id="tYukyu" onclick="showView('yukyu_list')">有給管理</button>
    <button class="nav-btn" id="tYukyuAdd" onclick="showView('yukyu_add')">＋ 有給登録</button>
    <button class="nav-btn" id="tKenko" onclick="showView('kenko_list')">健康診断</button>
    <button class="nav-btn" id="tSettings" onclick="showView('settings')">⚙ 設定</button>
    <button class="btn btn-sm" onclick="exportCSV()">CSV出力</button>
    <label class="btn btn-sm" style="cursor:pointer">CSV取込<input type="file" accept=".csv" id="csvImportInput" style="display:none" onchange="importCSV(this)"></label>
    <button class="btn btn-sm" onclick="downloadSampleCSV()">サンプルCSV</button>
    <button class="btn btn-sm" onclick="doLogout()">ログアウト</button>
  </header>
  <main id="mainContent"><div class="loading">読み込み中...</div></main>
</div>

<!-- 部署追加モーダル -->
<div class="modal-overlay" id="deptModal" style="display:none">
  <div class="modal-box">
    <h3 id="deptModalTitle">部署を追加</h3>
    <div class="field"><label>所属1（勤務先）<span style="color:var(--danger)"> *</span></label><input id="dm_s1" placeholder="例：株式会社〇〇"></div>
    <div class="field"><label>所属2（工場名）</label><input id="dm_s2" placeholder="例：第一工場"></div>

</div>

<!-- 在留資格モーダル -->
<div class="modal-overlay" id="visaModal" style="display:none">

    <h3 id="visaModalTitle">在留資格を追加</h3>

    <div class="actions">
      <button class="btn" onclick="closeVisaModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveVisaModal()">保存</button>

</div>

<!-- 有給付与登録モーダル -->
<div class="modal-overlay" id="grantModal" style="display:none">

<script>
const SUPABASE_URL='https://jqokhqybxjkcantxsjfm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxb2tocXlieGprY2FudHhzamZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODA0OTcsImV4cCI6MjA5MTI1NjQ5N30.BXjGGwnQXOAyKTlOcVs9v0myUqOGDybvTJ9saqdLIk0';
const APP_PASSWORD='kakuzen2025';
const KOYOU=['正社員','パート・アルバイト','契約社員','派遣社員','業務委託'];
const CHECKRES=['異常なし','要経過観察','要精密検査','受診未了'];
const USE_TYPES=['全日','半休（午前）','半休（午後）'];
const SHUBETSU=['自己都合','会社都合'];
const KUBUN=['計画','突発'];
const INPUT_BY=['三上','金森','岩本'];

let currentView='list',viewingId=null,editingId=null,detailTab='basic';
let employees=[],yukyuRecords=[],yukyuGrants=[],departments=[],visaTypes=[];
let kenkoImgData='',rcImgData='';
let yf={employee_id:null,employee_name:'',use_type:'',shubetsu:'',kubun:'',input_by:''};

let deptModalMode='add',deptModalId=null,deptModalCallback=null;

// フィルター状態を保持
let listFilter={sq:'',fs:'在籍',fd:'',fc:''};

// 一覧表示列の設定（デフォルト）
const ALL_COLS=[
  {key:'name',label:'氏名',default:true},
  {key:'company',label:'会社',default:true},
  {key:'shozoku1',label:'所属1',default:true},

  {key:'nyusha_date',label:'入社日',default:false},

];

try{const s=localStorage.getItem('visibleCols');if(s)visibleCols=JSON.parse(s);}catch(e){}

// 現在フィルター済みの従業員リスト（前後移動用）
let currentFilteredList=[];

// ---- Auth ----
function doLogin(){
  if(document.getElementById('pwInput').value===APP_PASSWORD){
    sessionStorage.setItem('auth','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='flex';

  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  loadAndRender();

// ---- Supabase ----
async function sb(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
async function loadEmployees(){employees=(await sb('employees?select=*&order=id.asc')).map(r=>({...r,yukyu_list:r.yukyu_list||[],kenkou_list:r.kenkou_list||[],shikaku_list:r.shikaku_list||[],residence_card_imgs:r.residence_card_imgs||[],license_imgs:r.license_imgs||[]}));}
async function loadYukyu(){yukyuRecords=await sb('yukyu_records?select=*&order=use_date.desc,id.desc');}
async function loadGrants(){yukyuGrants=await sb('yukyu_grants?select=*&order=grant_date.asc');}
async function loadDepts(){departments=await sb('departments?select=*&order=sort_order.asc,id.asc');}
async function loadVisaTypes(){visaTypes=await sb('visa_types?select=*&order=id.asc');}
async function loadAndRender(){
  try{await Promise.all([loadEmployees(),loadYukyu(),loadGrants(),loadDepts(),loadVisaTypes()]);}catch(e){console.error(e);}
  await checkAndAutoGrant();
  render();
}

// ---- 有給計算ヘルパー ----
function calcGrantDates(empId){
  // 入社日から全付与予定日を返す（過去〜未来3年分）
  const e=employees.find(x=>x.id===empId);
  if(!e||!e.nyusha_date)return[];
  const nyusha=new Date(e.nyusha_date);
  const dates=[];
  const first=new Date(nyusha);first.setMonth(first.getMonth()+6);
  dates.push(first.toISOString().slice(0,10));
  for(let i=1;i<=10;i++){
    const d=new Date(first);d.setFullYear(d.getFullYear()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function calcYukyuInfo(empId){
  const today=new Date();
  const todayStr=today.toISOString().slice(0,10);
  const e=employees.find(x=>x.id===empId);
  if(!e)return{granted:0,used:0,remaining:0,nextDate:null,nextDays:null,unsetDays:false};

  const grants=yukyuGrants.filter(g=>g.employee_id===empId);
  const twoYearsAgo=new Date(today);twoYearsAgo.setFullYear(twoYearsAgo.getFullYear()-2);

  // 付与合計（2年以内・日数が設定済みのもののみ）
  const granted=grants.reduce((s,g)=>{
    if(g.days===null||g.days===undefined||g.days==='')return s;
    const gd=new Date(g.grant_date);
    return gd>=twoYearsAgo?s+Number(g.days):s;
  },0);

  // 日数未設定の付与があるか
  const unsetDays=grants.some(g=>(g.days===null||g.days===undefined||g.days==='')&&g.grant_date<=todayStr);

  // 取得日数
  const recs=yukyuRecords.filter(r=>r.employee_id===empId);
  const used=recs.reduce((s,r)=>{
    if(r.use_type==='全日')return s+1;
    if(r.use_type&&r.use_type.startsWith('半休'))return s+0.5;
    return s;
  },0);
  const remaining=Math.max(0,granted-used);

  // 次回付与日
  const allDates=calcGrantDates(empId);
  const nextDate=allDates.find(d=>d>todayStr)||null;
  const nextGrant=grants.find(g=>g.grant_date===nextDate);
  const nextDays=nextGrant?(nextGrant.days!==null&&nextGrant.days!==''?Number(nextGrant.days):null):null;

  return{granted,used,remaining,nextDate,nextDays,unsetDays};
}

// ---- 自動付与チェック（ログイン時に実行） ----
async function checkAndAutoGrant(){
  const todayStr=new Date().toISOString().slice(0,10);
  for(const e of employees.filter(x=>x.status==='在籍'&&x.nyusha_date)){
    const dates=calcGrantDates(e.id);
    const existingDates=yukyuGrants.filter(g=>g.employee_id===e.id).map(g=>g.grant_date);
    for(const d of dates){
      if(d<=todayStr&&!existingDates.includes(d)){
        // 有効期限：付与日から2年後-1日
        const exp=new Date(d);exp.setFullYear(exp.getFullYear()+2);exp.setDate(exp.getDate()-1);
        const expStr=exp.toISOString().slice(0,10);
        try{
          await sb('yukyu_grants','POST',{employee_id:e.id,grant_date:d,days:null,expire_date:expStr});
        }catch(err){console.error('自動付与エラー',err);}
      }
    }
  }
  await loadGrants();
}

function deptLabelById(id){const d=departments.find(x=>x.id===Number(id));return d?deptLabel(d):''}

  if(checked){if(!visibleCols.includes(key))visibleCols.push(key);}

}

// ---- ファイル表示ヘルパー ----
function filePreviewHtml(src,height='100px'){
  if(!src)return'';
  if(src.includes('data:application/pdf')||src.includes('data:application/octet')||src.includes('data:application/x-pdf')){
    return`<a href="${src}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:var(--info-light);color:var(--info);border-radius:var(--radius);font-size:12px;text-decoration:none;border:1px solid var(--border)">📄 PDFを開く</a>`;
  }
  if(src.startsWith('data:image/')){
    return`<img src="${src}" style="max-height:${height};border-radius:var(--radius);border:1px solid var(--border);cursor:pointer" onclick="window.open('${src}')">`;
  }
  // 不明なファイル形式
  return`<a href="${src}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg);color:var(--text2);border-radius:var(--radius);font-size:12px;text-decoration:none;border:1px solid var(--border)">📎 ファイルを開く</a>`;
}

    </div>`).join('')}</div>`;

// ---- ドラッグ＆ドロップ共通 ----
function setupDrop(areaId,callback){
  const el=document.getElementById(areaId);
  if(!el)return;
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dragover');});
  el.addEventListener('dragleave',()=>el.classList.remove('dragover'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('dragover');
    const file=e.dataTransfer.files[0];
    if(!file)return;
    if(file.type.startsWith('image/')){
      compressImage(file).then(data=>callback(data,file.name));
    } else {
      // PDF等は圧縮せずbase64に
      const r=new FileReader();
      r.onload=ev=>callback(ev.target.result,file.name);
      r.readAsDataURL(file);
    }
  });
}

// ---- 画像圧縮共通関数 ----
function compressImage(file,maxPx=1200,quality=0.8){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){
          if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
          else{w=Math.round(w*maxPx/h);h=maxPx;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ---- 部署ドラッグ＆ドロップ ----
let dragSrcId=null;
function deptDragStart(e,id){
  dragSrcId=id;
  e.currentTarget.style.opacity='0.4';
  e.dataTransfer.effectAllowed='move';
}
function deptDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.borderTop='2px solid var(--accent)';
}
function deptDragEnd(e){
  e.currentTarget.style.opacity='1';
  document.querySelectorAll('.dept-row').forEach(r=>r.style.borderTop='');
}
async function deptDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.style.borderTop='';
  if(dragSrcId===targetId)return;
  const srcIdx=departments.findIndex(d=>d.id===dragSrcId);
  const tgtIdx=departments.findIndex(d=>d.id===targetId);
  const moved=departments.splice(srcIdx,1)[0];
  departments.splice(tgtIdx,0,moved);
  // sort_orderを更新
  try{
    await Promise.all(departments.map((d,i)=>sb('departments?id=eq.'+d.id,'PATCH',{sort_order:i+1})));
    await loadDepts();renderSettings();
  }catch(err){alert('並び替えの保存に失敗しました：'+err.message);}
}
async function deleteDept(id){
  const inUse=employees.some(e=>Number(e.dept_id)===id);
  if(inUse){alert('この部署は従業員に使用されているため削除できません。\n先に従業員の部署を変更してください。');return;}
  if(!confirm('この部署を削除しますか？'))return;
  await sb('departments?id=eq.'+id,'DELETE');
  await loadDepts();renderSettings();
}

function toggleKousoku(id,useKousoku,btn){
  btn.closest('.sel-group').querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const row=document.getElementById('kousokuDateRow');
  const note=row?.nextElementSibling;
  if(useKousoku){
    if(row)row.style.display='flex';

    saveKousokuDate(id,true);

async function saveKousokuDate(id,clear=false){

let grantEmpId=null,grantEditId=null;
function openGrantModal(empId,editGrantId=null){
  grantEmpId=empId;grantEditId=editGrantId;
  document.getElementById('grantModalTitle').textContent=editGrantId?'有給付与を編集':'有給付与を登録';
  if(editGrantId){
    const g=yukyuGrants.find(x=>x.id===editGrantId);
    document.getElementById('gm_date').value=g?.grant_date||'';
    document.getElementById('gm_days').value=g?.days!=null?g.days:'';
    document.getElementById('gm_expire').value=g?.expire_date||'';
  } else {
    const info=calcYukyuInfo(empId);
    document.getElementById('gm_date').value=info.nextDate||new Date().toISOString().slice(0,10);
    document.getElementById('gm_days').value='';
    document.getElementById('gm_expire').value='';
  }
  document.getElementById('grantModal').style.display='flex';
}
function closeGrantModal(){document.getElementById('grantModal').style.display='none';}
async function saveGrant(){
  const d=document.getElementById('gm_date').value;
  if(!d){alert('付与日は必須です');return;}
  const daysVal=document.getElementById('gm_days').value;
  const days=daysVal!==''?Number(daysVal):null;
  let expire=document.getElementById('gm_expire').value;
  if(!expire){
    const ed=new Date(d);ed.setFullYear(ed.getFullYear()+2);ed.setDate(ed.getDate()-1);
    expire=ed.toISOString().slice(0,10);
  }
  try{
    if(grantEditId){
      await sb('yukyu_grants?id=eq.'+grantEditId,'PATCH',{grant_date:d,days,expire_date:expire});
    } else {
      await sb('yukyu_grants','POST',{employee_id:grantEmpId,grant_date:d,days,expire_date:expire});
    }
    await loadGrants();closeGrantModal();renderDT();
  }catch(e){alert('保存に失敗しました：'+e.message);}
}
async function delGrant(id,empId){
  if(!confirm('この付与記録を削除しますか？'))return;
  await sb('yukyu_grants?id=eq.'+id,'DELETE');
  await loadGrants();renderDT();
}

function calcAgeVal(birthday){
  if(!birthday)return'';
  const today=new Date(),b=new Date(birthday);
  let age=today.getFullYear()-b.getFullYear();
  const m=today.getMonth()-b.getMonth();
  if(m<0||(m===0&&today.getDate()<b.getDate()))age--;
  return age;
}
function calcAge(){
  const v=document.getElementById('f_birthday')?.value;
  const d=document.getElementById('ageDisplay');
  if(!d)return;
  d.textContent=v?calcAgeVal(v)+'歳':'生年月日を入力してください';
}

    taishoku_date:document.getElementById('f_taishoku_date')?.value||'',
    status:g('status'),

    visa:g('visa'),visa_expiry:g('visa_expiry'),visa_no:g('visa_no'),residence_card:rcImgData,

    license_no:g('license_no'),license_date:g('license_date'),license_expiry:g('license_expiry'),

  try{
    if(isEdit){
      const ex=employees.find(e=>e.id===id);
      emp.yukyu_list=ex?.yukyu_list||[];
      emp.kenkou_list=ex?.kenkou_list||[];
      // 既存shikaku_listの4件目以降を保持しつつフォームの3件を上書き
      const existingSk=ex?.shikaku_list||[];
      const formSk=[0,1,2].map(i=>{
        const name=document.getElementById('f_sk'+i+'_name')?.value.trim()||'';
        const img=skFormImgData[i]||(existingSk[i]?.img||'');
        return name?{name,img,date:existingSk[i]?.date||'',expiry:existingSk[i]?.expiry||''}:null;
      }).filter(Boolean);
      emp.shikaku_list=[...formSk,...existingSk.slice(3)];
      await sb('employees?id=eq.'+id,'PATCH',emp);
    } else {
      emp.yukyu_list=[];emp.kenkou_list=[];
      emp.shikaku_list=[0,1,2].map(i=>{
        const name=document.getElementById('f_sk'+i+'_name')?.value.trim()||'';
        return name?{name,img:skFormImgData[i]||'',date:'',expiry:''}:null;
      }).filter(Boolean);
      await sb('employees','POST',emp);
    }
    licFormImgData='';skFormImgData=['','',''];
    await loadEmployees();currentView='list';render();
  }catch(e){alert('保存に失敗しました：'+e.message);}
}

async function importCSV(input){
  const file=input.files[0];if(!file)return;
  const text=await file.text();
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2){alert('データがありません');return;}
  const headers=parseCSVLine(lines[0]);
  const idx=col=>headers.indexOf(col);
  const rows=lines.slice(1).map(l=>parseCSVLine(l));
  if(!confirm(`${rows.length}件のデータをインポートします。よろしいですか？`))return;
  let ok=0,err=0;
  for(const r of rows){
    const g=col=>{const i=idx(col);return i>=0?(r[i]||''):'';};
    if(!g('姓')&&!g('名'))continue;
    const emp={
      shain_no:g('社員番号'),my_number:g('マイナンバー'),company:g('会社'),
      sei:g('姓'),mei:g('名'),seikana:g('姓カナ'),meikana:g('名カナ'),
      birthday:g('生年月日'),gender:g('性別'),address:g('住所'),tel:g('電話'),email:g('メール'),
      position:g('役職'),koyou:g('雇用形態'),nyusha_date:g('入社日'),status:g('在籍状況')||'在籍',
      kyuyo:g('月給'),jikyu:g('時給'),
      visa:g('在留資格'),visa_no:g('在留カード番号'),visa_expiry:g('在留期限'),
      koyo_hoken_no:g('雇用保険番号'),koyo_nyusha:g('雇用保険加入日'),koyo_soshitsu:g('雇用保険喪失日'),
      shakai_hoken_no:g('社会保険番号'),shakai_nyusha:g('社会保険加入日'),shakai_soshitsu:g('社会保険喪失日'),
      license_no:g('免許証番号'),license_date:g('免許取得日'),license_expiry:g('免許有効期限'),
      bank_name:g('銀行名'),bank_branch:g('支店名'),bank_account_no:g('口座番号'),bank_account_name:g('口座名義'),
      memo:g('メモ'),yukyu_list:[],kenkou_list:[],shikaku_list:[],
      updated_at:new Date().toISOString().slice(0,10)
    };
    try{await sb('employees','POST',emp);ok++;}catch(e){err++;console.error(e);}
  }
  input.value='';
  await loadEmployees();render();
  alert(`インポート完了！\n成功：${ok}件${err?'\nエラー：'+err+'件':''}`);
}
function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());return result;
}

function dlCSV(data,name){
  const csv='\uFEFF'+data.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=name+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
